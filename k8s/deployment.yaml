apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-platform
  namespace: content-platform
  labels:
    app: content-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-platform
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: content-platform
    spec:
      containers:
        - name: content-platform
          image: ghcr.io/dami-lowdev/content-platform:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: content-platform-config
          env:
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: content-platform-secret
                  key: AZURE_STORAGE_CONNECTION_STRING
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
