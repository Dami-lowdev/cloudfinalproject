apiVersion: networking.k8s.io/v1
 kind: NetworkPolicy
 metadata:
   name: content-platform-netpol
   namespace: content-platform
 spec:
   podSelector:
     matchLabels:
       app: content-platform
   policyTypes:
     - Ingress
   ingress:
     - from:
         - namespaceSelector:
             matchLabels:
               kubernetes.io/metadata.name: ingress-nginx
       ports:
         - protocol: TCP
           port: 5000
