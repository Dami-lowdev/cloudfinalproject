apiVersion: autoscaling/v2
 kind: HorizontalPodAutoscaler
 metadata:
   name: content-platform-hpa
   namespace: content-platform
 spec:
   scaleTargetRef:
     apiVersion: apps/v1
     kind: Deployment
     name: content-platform
   minReplicas: 2
   maxReplicas: 5
   metrics:
     - type: Resource
       resource:
         name: cpu
         target:
           type: Utilization
           averageUtilization: 70
