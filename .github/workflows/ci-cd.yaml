name: CI/CD — Content Platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/content-platform

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 : Lint + Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8 pytest

      - name: Lint avec flake8
        run: |
          flake8 app/app.py --max-line-length=120 --select=E9,F63,F7,F82
          flake8 app/app.py --max-line-length=120 --exit-zero

      - name: Tests pytest
        run: |
          cd app && pytest tests/ -v --tb=short
        env:
          AZURE_STORAGE_CONNECTION_STRING: ""
          AZURE_CONTAINER_NAME: content
          CACHE_TTL: "60"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 : Build & Push image Docker vers GHCR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login vers GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extraire les metadonnees Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build et push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3 : Deploiement sur AKS via kubeconfig (sans Service Principal)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy sur AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer kubectl
        uses: azure/setup-kubectl@v3

      - name: Configurer kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verifier la connexion au cluster
        run: kubectl get nodes

      - name: Appliquer les manifests Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Mettre a jour l'image
        run: |
          kubectl set image deployment/content-platform \
            content-platform=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -n content-platform

      - name: Attendre le rollout
        run: |
          kubectl rollout status deployment/content-platform \
            -n content-platform --timeout=120s

      - name: Smoke test post-deploiement
        run: |
          INGRESS_IP=$(kubectl get ingress content-platform-ingress \
            -n content-platform \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "IP Ingress : $INGRESS_IP"
          sleep 10
          curl -f http://$INGRESS_IP/healthz && echo "Smoke test OK"